<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股癌趨勢雷達儀表板</title>
<style>
  :root {
    --bg-main: #0d0d0d;
    --bg-card: #161616;
    --border: #2e2e2e;
    --text-main: #ffffff;
    --text-sub: #c8c8c8;
    --text-muted: #888;
    --bullish: #00e676;
    --watch: #ffb74d;
    --reduce: #ff5252;
    --exit: #78909c;
    --accent: #e91e8c;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-main); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif; padding-bottom: 60px; -webkit-font-smoothing: antialiased; font-size: 15px; }

  /* ── 頂部 Header ── */
  .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; padding: 16px 28px; background: rgba(13,13,13,0.97); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); gap: 14px; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 21px; font-weight: 800; letter-spacing: -0.3px; color: #fff; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #ff5252); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .updated-text { font-size: 12px; color: #666; }
  .controls { flex: 1; max-width: 440px; }
  .search-box { width: 100%; padding: 10px 18px; border-radius: 22px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: #555; }

  /* ── 篩選條 ── */
  .filters { display: flex; gap: 8px; padding: 16px 28px 0; overflow-x: auto; scrollbar-width: none; flex-wrap: wrap; }
  .filters::-webkit-scrollbar { display: none; }
  .chip { background: var(--bg-card); border: 1px solid var(--border); color: #aaa; padding: 7px 16px; border-radius: 22px; font-size: 13px; cursor: pointer; transition: all 0.18s; white-space: nowrap; user-select: none; }
  .chip:hover { color: #fff; border-color: #555; }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .chip-bullish { border-color: rgba(0,230,118,0.5) !important; color: var(--bullish) !important; }
  .chip-bullish.active { background: rgba(0,230,118,0.18) !important; border-color: var(--bullish) !important; }

  /* ── 統計列 ── */
  .stats-bar { display: flex; gap: 0; padding: 16px 28px 0; }
  .stat { flex: 0 0 auto; text-align: center; padding-right: 28px; border-right: 1px solid var(--border); margin-right: 28px; }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 26px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
  .stat-lbl { font-size: 11px; color: #666; margin-top: 2px; }

  /* ── 儀表板網格 ── */
  .dashboard { padding: 22px 28px; display: grid; grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); gap: 20px; }

  /* ── 板塊卡片 ── */
  .sector-group { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .sector-header { background: #1c1c1c; padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .sector-title { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: #fff; }
  .sector-count { font-size: 12px; background: #2a2a2a; padding: 3px 10px; border-radius: 10px; color: #bbb; font-weight: 600; }
  .sector-sent-summary { display: flex; gap: 7px; }
  .sum-badge { font-size: 12px; padding: 3px 9px; border-radius: 6px; font-weight: 700; }

  /* ── 資料表 ── */
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 12px; color: #777; padding: 10px 16px; border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap; letter-spacing: 0.3px; text-transform: uppercase; }
  td { padding: 14px 16px; border-bottom: 1px solid #1e1e1e; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1f1f1f; }

  .stock-cell { display: flex; flex-direction: column; gap: 4px; }
  .symbol { font-size: 16px; font-weight: 800; color: #ffffff; letter-spacing: -0.2px; }
  .sname { font-size: 14px; color: #ffffff; font-weight: 600; }

  .sent-badge { display: inline-block; padding: 5px 12px; border-radius: 7px; font-size: 13px; font-weight: 800; white-space: nowrap; }
  .sent-看好 { background: rgba(0,230,118,0.18); color: #00e676; border: 1px solid rgba(0,230,118,0.4); }
  .sent-觀察 { background: rgba(255,183,77,0.18); color: #ffb74d; border: 1px solid rgba(255,183,77,0.4); }
  .sent-減碼 { background: rgba(255,82,82,0.18); color: #ff5252; border: 1px solid rgba(255,82,82,0.4); }
  .sent-出場 { background: rgba(120,144,156,0.18); color: #90a4ae; border: 1px solid rgba(120,144,156,0.4); }

  .ep-lbl { font-size: 12px; color: #777; margin-top: 4px; font-weight: 500; }
  .price-val { font-size: 15px; font-weight: 700; color: #ffffff; }
  .perf { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
  .pos { color: #00e676; }
  .neg { color: #ff5252; }
  .dash { color: #444; font-size: 14px; }

  .tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; max-width: 180px; }
  .tag { font-size: 11px; background: #222; color: #aaa; padding: 3px 8px; border-radius: 5px; border: 1px solid #333; white-space: nowrap; font-weight: 500; }

  .hidden { display: none; }

  /* ── 最新一集總結區塊 ── */
  .summary-wrapper { padding: 20px 28px 0; }
  .latest-summary-box { background: linear-gradient(135deg, #161616 0%, #1a1218 100%); border: 1px solid #3a2535; border-radius: 16px; overflow: hidden; }
  .summary-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid #2e2030; background: rgba(233,30,140,0.06); }
  .ep-badge-large { background: var(--accent); color: #fff; font-size: 13px; font-weight: 800; padding: 5px 14px; border-radius: 8px; letter-spacing: 0.5px; }
  .summary-title { font-size: 16px; font-weight: 700; color: #fff; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .market-col { padding: 16px 20px; }
  .market-col:first-child { border-right: 1px solid #2e2030; }
  .market-title { font-size: 14px; font-weight: 700; color: #bbb; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2a2a2a; }
  .action-group { margin-bottom: 10px; }
  .action-title { margin-bottom: 6px; }
  .action-items { display: flex; flex-direction: column; gap: 5px; padding-left: 4px; }
  .action-item { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .action-stock { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; }
  .action-note { font-size: 12px; color: #888; }

  /* ── 追蹤時長徽章 ── */
  .ep-track { margin-top: 4px; display: flex; align-items: center; gap: 5px; }
  .ep-new { font-size: 10px; background: rgba(233,30,140,0.18); color: var(--accent); padding: 2px 7px; border-radius: 4px; border: 1px solid rgba(233,30,140,0.35); font-weight: 700; letter-spacing: 0.3px; white-space: nowrap; }
  .ep-duration { font-size: 10px; background: #1e1e1e; color: #666; padding: 2px 7px; border-radius: 4px; border: 1px solid #2c2c2c; font-weight: 600; white-space: nowrap; }
  .ep-duration-strong { color: #00c853 !important; border-color: rgba(0,200,83,0.35) !important; background: rgba(0,200,83,0.08) !important; }

  /* ── 趨勢主軸 ── */
  .pillars-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .pillars-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
  .pillars-icon { width: 30px; height: 30px; background: linear-gradient(135deg, #1a237e, #283593); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .pillars-h-info .pillars-h-title { font-size: 15px; font-weight: 800; color: #fff; }
  .pillars-h-info .pillars-h-sub { font-size: 11px; color: #555; margin-top: 2px; }
  .pillar-list { display: flex; flex-direction: column; }
  .pillar-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 20px; border-bottom: 1px solid #191919; transition: background 0.15s; }
  .pillar-item:last-child { border-bottom: none; }
  .pillar-item:hover { background: #111; }
  .pillar-left { display: flex; flex-direction: column; align-items: center; gap: 0; flex-shrink: 0; padding-top: 4px; }
  .pillar-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .pillar-vline { width: 1px; background: #222; flex: 1; min-height: 18px; margin-top: 4px; }
  .pillar-body { flex: 1; min-width: 0; }
  .pillar-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
  .pillar-name { font-size: 14px; font-weight: 800; color: #fff; }
  .pillar-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 5px; white-space: nowrap; }
  .s持續中 { background: rgba(0,230,118,0.12); color: #00e676; border: 1px solid rgba(0,230,118,0.3); }
  .s醞釀中 { background: rgba(255,183,77,0.12); color: #ffb74d; border: 1px solid rgba(255,183,77,0.3); }
  .s觀察中 { background: rgba(255,152,0,0.12); color: #ff9800; border: 1px solid rgba(255,152,0,0.3); }
  .s已出場 { background: rgba(120,144,156,0.1); color: #78909c; border: 1px solid rgba(120,144,156,0.25); }
  .pillar-summary { font-size: 12px; color: #888; line-height: 1.65; margin-bottom: 7px; }
  .pillar-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pillar-ep-range { font-size: 11px; color: #555; }
  .pillar-stocks { display: flex; flex-wrap: wrap; gap: 4px; }
  .pillar-stk { font-size: 11px; background: #1c1c1c; color: #999; padding: 2px 7px; border-radius: 4px; border: 1px solid #2a2a2a; font-weight: 600; }

  @media (max-width: 768px) {
    .dashboard { grid-template-columns: 1fr; padding: 14px; }
    .controls { max-width: 100%; }
    .filters { padding: 10px 14px 0; }
    .summary-wrapper { padding: 14px 14px 0; }
    .summary-grid { grid-template-columns: 1fr; }
    .market-col:first-child { border-right: none; border-bottom: 1px solid #2e2030; }
    th:nth-child(4), td:nth-child(4) { display: none; }
    th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>

const LATEST_EP_NUM = Math.max(...RAW_DATA.map(d => parseInt(d.episode.replace('EP',''))));
let currentFilter = 'all';

function setFilter(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.filter;
  renderDashboard();
}

function fmtPerf(v) {
  if (v == null) return '<span class="dash perf">—</span>';
  const cls = v >= 0 ? 'pos' : 'neg';
  const sign = v > 0 ? '+' : '';
  return `<span class="perf ${cls}">${sign}${v.toFixed(2)}%</span>`;
}

function getTrackHtml(s) {
  const firstEpNum = parseInt((s.firstEp || s.episode).replace('EP',''));
  const epNum = parseInt(s.episode.replace('EP',''));
  const diff = epNum - firstEpNum;
  if (diff === 0 && epNum === LATEST_EP_NUM) {
    return '<div class="ep-track"><span class="ep-new">本集新進</span></div>';
  } else if (diff >= 1) {
    const cls = diff >= 4 ? ' ep-duration-strong' : '';
    return `<div class="ep-track"><span class="ep-duration${cls}">持續 ${diff+1} 集</span></div>`;
  }
  return '';
}

function renderDashboard() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const dash = document.getElementById('dashboard');

  let data = RAW_DATA.filter(s => {
    const matchSearch = !q ||
      s.symbol.toLowerCase().includes(q) ||
      s.name.toLowerCase().includes(q) ||
      s.sector.toLowerCase().includes(q) ||
      s.tags.some(t => t.toLowerCase().includes(q));
    let matchFilter = true;
    if (currentFilter === 'TW')   matchFilter = s.exchange === 'TW';
    else if (currentFilter === 'US')   matchFilter = s.exchange === 'US';
    else if (currentFilter === '看好') matchFilter = s.sentiment === '看好';
    else if (currentFilter === '觀察') matchFilter = s.sentiment === '觀察';
    else if (currentFilter === '出場') matchFilter = s.sentiment === '出場' || s.sentiment === '減碼';
    return matchSearch && matchFilter;
  });

  const total = data.length;
  const bull  = data.filter(s => s.sentiment === '看好').length;
  const twCnt = data.filter(s => s.exchange === 'TW').length;
  const usCnt = data.filter(s => s.exchange === 'US').length;
  const groups = {};
  data.forEach(s => { if (!groups[s.sector]) groups[s.sector] = []; groups[s.sector].push(s); });

  document.getElementById('st-total').textContent   = total;
  document.getElementById('st-bull').textContent    = bull;
  document.getElementById('st-tw').textContent      = twCnt;
  document.getElementById('st-us').textContent      = usCnt;
  document.getElementById('st-sectors').textContent = Object.keys(groups).length;

  if (total === 0) {
    dash.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:60px">找不到符合條件的標的 🦆</div>';
    return;
  }

  let html = '';
  for (const [sector, stocks] of Object.entries(groups)) {
    const sentMap = {};
    stocks.forEach(s => { sentMap[s.sentiment] = (sentMap[s.sentiment]||0)+1; });
    let sumHtml = '';
    ['看好','觀察','減碼','出場'].forEach(k => {
      if (sentMap[k]) sumHtml += `<span class="sum-badge" style="${SENT_SUM_STYLE[k]||''}">${sentMap[k]} ${k}</span>`;
    });

    html += `<div class="sector-group">
  <div class="sector-header">
    <div class="sector-title">${sector}<span class="sector-count">${stocks.length}</span></div>
    <div class="sector-sent-summary">${sumHtml}</div>
  </div>
  <table>
    <thead><tr>
      <th>標的</th><th>情緒&集數</th><th>現價</th>
      <th>7D</th><th>30D</th><th>YTD</th>
      <th>催化劑標籤</th>
    </tr></thead>
    <tbody>`;

    stocks.forEach(s => {
      const pd = s.pd || {};
      const tagsHtml = s.tags.map(t => `<span class="tag">#${t}</span>`).join('');
      const trackHtml = getTrackHtml(s);
      html += `<tr>
        <td><div class="stock-cell"><span class="symbol">${s.symbol}</span><span class="sname">${s.name}</span></div></td>
        <td><div class="stock-cell"><span class="sent-badge sent-${s.sentiment}">${s.sentiment}</span><span class="ep-lbl">${s.episode}</span>${trackHtml}</div></td>
        <td class="price-val">${pd.price || '—'}</td>
        <td>${fmtPerf(pd.p7)}</td>
        <td>${fmtPerf(pd.p30)}</td>
        <td>${fmtPerf(pd.pYTD)}</td>
        <td><div class="tags-wrap">${tagsHtml}</div></td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  }
  dash.innerHTML = html;
}

      return `<span class="pillar-stk">${sym}${d ? ' ' + d.name : ''}</span>`;
    }).join('');
    const isLast = i === TREND_PILLARS.length - 1;

    html += `<div class="pillar-item">
      <div class="pillar-left">
        <div class="pillar-dot" style="background:${DOT_COLOR[p.status]||'#555'}"></div>
        ${!isLast ? '<div class="pillar-vline"></div>' : ''}
      </div>
      <div class="pillar-body">
        <div class="pillar-name-row">
          <span class="pillar-name">${p.title}</span>
          <span class="pillar-status s${p.status}">${p.status}</span>
        </div>
        <div class="pillar-summary">${p.summary}</div>
        <div class="pillar-meta">
          <span class="pillar-ep-range">${epRangeTxt}｜${durTxt}</span>
          <div class="pillar-stocks">${stocksHtml}</div>
        </div>
      </div>
    </div>`;
  });

  html += `</div></div>`;
  wrapper.innerHTML = html;
}

function renderLatestSummary() {
  const wrapper = document.getElementById('latestSummaryWrapper');
  const latestEpStr = 'EP' + LATEST_EP_NUM;
  const latestData = RAW_DATA.filter(d => d.episode === latestEpStr);
  const twData = latestData.filter(d => d.exchange === 'TW');
  const usData = latestData.filter(d => d.exchange === 'US');

  const genList = (data) => {
    if (data.length === 0) return '<div class="action-note" style="color:#555;padding:8px 0;">本集無此市場更新</div>';
    const grouped = data.reduce((acc, s) => { (acc[s.sentiment] = acc[s.sentiment]||[]).push(s); return acc; }, {});
    let html = '';
    ['看好','觀察','減碼','出場'].forEach(sent => {
      if (!grouped[sent]) return;
      html += `<div class="action-group"><div class="action-title"><span class="sent-badge sent-${sent}" style="padding:3px 8px;font-size:11px;">${sent}</span></div><div class="action-items">`;
      grouped[sent].forEach(s => {
        html += `<div class="action-item"><span class="action-stock">${s.name} (${s.symbol})</span><span class="action-note">— ${s.tags.slice(0,2).join('、')}</span></div>`;
      });
      html += `</div></div>`;
    });
    return html;
  };

  wrapper.innerHTML = `
    <div class="latest-summary-box">
      <div class="summary-header">
        <span class="ep-badge-large">${latestEpStr}</span>
        <span class="summary-title">最新一集動態</span>
      </div>
      <div class="summary-grid">
        <div class="market-col"><div class="market-title">🇹🇼 台股動態</div>${genList(twData)}</div>
        <div class="market-col"><div class="market-title">🇺🇸 美股動態</div>${genList(usData)}</div>
      </div>
    </div>`;
}

renderTrendPillars();
renderLatestSummary();
renderDashboard();
</script>
</body>
</html>
